query ProductsPerformance($first: Int!, $after: String, $query: String) {
  products(first: $first, after: $after, query: $query, sortKey: UPDATED_AT, reverse: true) {
    nodes {
      id
      title
      handle
      status
      totalInventory
      updatedAt
      variants(first: 20) {
        nodes {
          id
          sku
          inventoryQuantity
          price
          compareAtPrice
        }
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
